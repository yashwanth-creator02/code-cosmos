<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <!-- Outer orbit ring -->
  <ellipse cx="48" cy="48" rx="40" ry="18" stroke="currentColor" stroke-width="3.2" opacity="0.5" transform="rotate(-25 48 48)"/>

  <!-- Inner orbit ring -->
  <ellipse cx="48" cy="48" rx="24" ry="10" stroke="currentColor" stroke-width="2" opacity="0.4" transform="rotate(-25 48 48)"/>

  <!-- Central star -->
  <circle cx="48" cy="48" r="10" fill="currentColor" opacity="0.95"/>

  <!-- Orbiting planet 1 -->
  <circle cx="80" cy="40" r="6" fill="currentColor" opacity="0.75"/>

  <!-- Orbiting planet 2 -->
  <circle cx="20" cy="60" r="4.8" fill="currentColor" opacity="0.6"/>

  <!-- Small moon -->
  <circle cx="68" cy="66" r="2.8" fill="currentColor" opacity="0.5"/>
</svg>
