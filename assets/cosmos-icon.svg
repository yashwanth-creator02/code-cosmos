<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Outer orbit ring -->
  <ellipse cx="12" cy="12" rx="10" ry="4.5" stroke="currentColor" stroke-width="1" opacity="0.5" transform="rotate(-25 12 12)"/>
  <!-- Inner orbit ring -->
  <ellipse cx="12" cy="12" rx="6" ry="2.5" stroke="currentColor" stroke-width="0.8" opacity="0.4" transform="rotate(-25 12 12)"/>
  <!-- Central star -->
  <circle cx="12" cy="12" r="2.5" fill="currentColor" opacity="0.95"/>
  <!-- Orbiting planet 1 -->
  <circle cx="20" cy="10" r="1.2" fill="currentColor" opacity="0.75"/>
  <!-- Orbiting planet 2 -->
  <circle cx="5" cy="15" r="0.9" fill="currentColor" opacity="0.6"/>
  <!-- Small moon -->
  <circle cx="17" cy="16.5" r="0.6" fill="currentColor" opacity="0.5"/>
</svg>
